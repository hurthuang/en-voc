<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><title>UEB G2 batch translate</title></head>
<body>
<script src="/build-no-tables-utf32.js"></script>
<script>
const LOU = (() => {
    const M = (typeof liblouisBuild !== 'undefined') ? liblouisBuild : null;
    const _tableCache = new Set();
    const TABLE_DIR = '/table/';

    // 這份是實際遞迴讀 table/*.ctb 的 include 指令算出來的真實依賴關係
    // （原本抄 braille-translate.htm 裡的 TABLE_DEPS 有幾個檔名對不上，會 404）
    const TABLE_DEPS = {
        'en-ueb-g2.ctb':       ['en-ueb-g1.ctb', 'en-ueb-math.ctb'],
        'en-ueb-g1.ctb':       ['en-ueb-chardefs.uti', 'braille-patterns.cti'],
        'en-ueb-chardefs.uti': ['text_nabcc.dis', 'spaces.uti', 'latinLetterDef6Dots.uti', 'latinUppercaseComp6.uti'],
    };

    function isReady() { return !!(M && M.calledRun); }

    async function _loadTableFile(filename) {
        if (_tableCache.has(filename)) return;
        _tableCache.add(filename);
        try {
            const resp = await fetch(TABLE_DIR + filename);
            if (!resp.ok) throw new Error(resp.status);
            const arrayBuf = await resp.arrayBuffer();
            try { M.FS.mkdir('/tables'); } catch(e) {}
            const bytes = new Uint8Array(arrayBuf);
            let fileStr = '';
            for (let b = 0; b < bytes.length; b++) fileStr += String.fromCharCode(bytes[b]);
            if (filename.endsWith('.ctb') || filename.endsWith('.uti')) {
                fileStr = fileStr.split('\n').map(line => {
                    const t = line.trim();
                    if (t.startsWith('seqdelimiter') || t.startsWith('seqbeforechars') ||
                        t.startsWith('seqafterchars') || t.startsWith('seqafterexpression') ||
                        t.startsWith('seqafterpattern')) {
                        return '# ' + line;
                    }
                    return line;
                }).join('\n');
            }
            M.FS.writeFile('/tables/' + filename, fileStr);
        } catch(e) {
            console.warn('liblouis: table load failed', filename, e.message);
        }
        const deps = TABLE_DEPS[filename] || [];
        await Promise.all(deps.map(d => _loadTableFile(d)));
    }

    function _louTranslate(tableFile, text) {
        if (!isReady()) return null;
        try {
            const inputLen = text.length;
            const inBuf = M._malloc((inputLen + 1) * 4);
            for (let i = 0; i < inputLen; i++)
                M.setValue(inBuf + i * 4, text.codePointAt(i), 'i32');
            M.setValue(inBuf + inputLen * 4, 0, 'i32');

            const outMax = inputLen * 4 + 16;
            const outBuf = M._malloc((outMax + 1) * 4);
            const inLenPtr = M._malloc(4);
            const outLenPtr = M._malloc(4);
            M.setValue(inLenPtr, inputLen, 'i32');
            M.setValue(outLenPtr, outMax, 'i32');

            const tableStr = M.allocate(
                M.intArrayFromString('/tables/' + tableFile),
                'i8', M.ALLOC_NORMAL
            );
            const ret = M._lou_translateString(
                tableStr, inBuf, inLenPtr, outBuf, outLenPtr,
                0, 0, 0
            );
            M._free(tableStr);

            let result = null;
            if (ret > 0) {
                const outLen = M.getValue(outLenPtr, 'i32');
                const NABCC_TO_UNI = {
                    32:0x2800, 97:0x2801, 49:0x2802, 98:0x2803, 39:0x2804,
                    107:0x2805, 50:0x2806, 108:0x2807, 96:0x2808, 99:0x2809,
                    105:0x280a, 102:0x280b, 47:0x280c, 109:0x280d, 115:0x280e,
                    112:0x280f, 34:0x2810, 101:0x2811, 51:0x2812, 104:0x2813,
                    57:0x2814, 111:0x2815, 54:0x2816, 114:0x2817, 126:0x2818,
                    100:0x2819, 106:0x281a, 103:0x281b, 62:0x281c, 110:0x281d,
                    116:0x281e, 113:0x281f, 44:0x2820, 42:0x2821, 53:0x2822,
                    60:0x2823, 45:0x2824, 117:0x2825, 56:0x2826, 118:0x2827,
                    46:0x2828, 37:0x2829, 123:0x282a, 36:0x282b, 43:0x282c,
                    120:0x282d, 33:0x282e, 38:0x282f, 59:0x2830, 58:0x2831,
                    52:0x2832, 124:0x2833, 48:0x2834, 122:0x2835, 55:0x2836,
                    40:0x2837, 95:0x2838, 63:0x2839, 119:0x283a, 125:0x283b,
                    35:0x283c, 121:0x283d, 41:0x283e, 61:0x283f
                };
                let out = '';
                for (let i = 0; i < outLen; i++) {
                    const val = M.getValue(outBuf + i * 4, 'i32');
                    const uni = NABCC_TO_UNI[val];
                    out += String.fromCharCode(uni !== undefined ? uni : 0x2800 + val);
                }
                result = out;
            }
            M._free(inBuf); M._free(outBuf);
            M._free(inLenPtr); M._free(outLenPtr);
            return result;
        } catch(e) {
            console.error('liblouis translate error:', e);
            return null;
        }
    }

    async function preload() {
        await _loadTableFile('en-ueb-g2.ctb');
    }

    function translate(text) {
        return _louTranslate('en-ueb-g2.ctb', text);
    }

    return { preload, translate, isReady };
})();

// en-ueb-g2.ctb 裡有一批單格縮寫字／傳統縮寫（shortform，例如 it/you/so/do/as，
// 也包括 about 這種 "ab" 兩格縮寫），背後的規則（無論是 match 或其他 opcode）結尾都
// 要求「後面還要有一個字元」才會生效；當這個字直接貼著標點（沒有空白）出現時，這個
// 條件就無法成立，縮寫會失效、退化成逐字母拼寫（例如 "I get it." 的 it 應該是 ⠭，
// 卻拼成 ⠊⠞；"about..." 的 about 應該是 ⠁⠃，卻多拼出 ⠳⠞）。這是 liblouis/這份表格
// 本身的行為，不是我們資料的問題。只在標點前是小寫字母/數字時才處理——大寫縮寫詞
// （如 OK）沒有這個問題，不需要處理。
const TRAILING_PUNCT_RE = /([a-z0-9])([.,!?;:'"’”)\]]+)(?![a-zA-Z0-9])/g;

// 修法：曾經試過「標點前插入空白讓縮寫規則生效，翻譯完再用字串比對把多插入的
// 空白/副作用清掉」，但這招不安全——事後比對點字輸出去猜「這格是不是標點」
// 一定會誤判，因為同一個點字樣式在不同字裡意義不同（例如 ⠒ 通常是冒號，但也是
// "convention" 開頭 con- 這個縮寫的樣式，會讓清理規則誤判、把前面合法的空白格
// 也一起吃掉，見 issue：翰林9上5 "comic book convention" 的 book/convention
// 中間空白被吃掉）。
//
// 改成完全不同的作法：把字串從「縮寫字緊貼標點」的地方切開，切成好幾段，每段
// 各自獨立丟給 liblouis 翻譯（單獨翻譯時，這個字就是這段結尾，縮寫規則自然會
// 生效，不需要額外插入任何字元），再把每段翻譯結果直接接起來，中間不額外插入
// 任何空白（原文這裡本來就沒有空白）。這樣完全不需要對翻譯出來的點字字串做任何
// 猜測性的樣式比對，就不會有「誤判成標點」的風險。
//
// 例外：切出來的「純標點」那一段，如果是問號或分號結尾（? ;），孤立翻譯本身不可靠
// ——liblouis 需要「前面貼著別的東西」才會給正確樣式，孤立翻譯反而會多出一個 ⠰
// 指示格（例如單獨的 "?" 會翻成 "⠰⠦" 而非 "⠦"）。這種情況一樣用「前面加空白讓
// 翻譯正常、再把加的空白跟多出來的指示格拿掉」來處理，但範圍只限定在「這一小段
// 純標點自己的翻譯結果」內處理，不會去比對其他段落或整段組合後的輸出，所以不會
// 有波及到別的字的風險。句號、逗號、驚嘆號沒有這個問題，孤立翻譯就是乾淨的。
const PURE_PUNCT_RE = /^[.,!?;:'"’”)\]]+$/;

function translateFixed(text) {
    // 雙引號需要「這裡有沒有先出現過開引號」的跨字元狀態才能正確判斷是開引號還是
    // 閉引號（例如 "cat." 結尾的右引號要知道前面配對的左引號才會翻對），把字串切開
    // 分段翻譯會弄丟這個狀態、翻錯。資料裡含雙引號的句子（"Circle/Point to/Spell/
    // Write the word "cat."" 這幾筆），引號前面的字（cat／bag）本來就不是會受這個
    // bug 影響的縮寫字，不需要切段處理，直接整句丟給 liblouis 翻就好。
    if (text.includes('"')) return LOU.translate(text);

    const matches = [...text.matchAll(TRAILING_PUNCT_RE)];
    if (matches.length === 0) return LOU.translate(text);

    const segments = [];
    let cursor = 0;
    for (const m of matches) {
        const wordEnd = m.index + m[1].length; // 切到「字」的最後一個字元為止（不含標點）
        segments.push(text.slice(cursor, wordEnd));
        cursor = wordEnd;
    }
    segments.push(text.slice(cursor));

    return segments
        .map((seg, i) => {
            if (!seg) return '';
            if (i > 0 && PURE_PUNCT_RE.test(seg)) {
                let out = LOU.translate(' ' + seg) || '';
                out = out.replace(/^⠀/, '').replace(/⠰(?=[⠦⠆]$)/, '');
                return out;
            }
            return LOU.translate(seg) || '';
        })
        .join('');
}

window.__batchTranslate = async function(words) {
    await LOU.preload();
    const out = {};
    for (const w of words) {
        out[w] = translateFixed(w) || '';
    }
    return out;
};
window.__louReady = true;
</script>
</body>
</html>
